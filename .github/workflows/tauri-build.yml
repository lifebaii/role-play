name: Tauri Build

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 应用名称
        required: true
        default: Role-Play
        type: string
      app_url:
        description: 应用网址
        required: true
        default: https://github.com
        type: string
      version:
        description: 版本号
        required: true
        default: 1.0.0
        type: string
      platforms:
        description: 平台选择 (macos, ubuntu, windows, ios, android, all)
        required: true
        default: all
        type: string

jobs:
  create-tauri-project:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate Tauri config files
        env:
          APP_NAME: ${{ inputs.app_name }}
          APP_URL: ${{ inputs.app_url }}
          VERSION: ${{ inputs.version }}
        run: |
          mkdir -p src-tauri/src
          
          # Generate tauri.conf.json
          cat > src-tauri/tauri.conf.json << 'EOF'
          {
            "$schema": "https://schema.tauri.app/config/2.0.0",
            "productName": "",
            "version": "",
            "identifier": "",
            "build": {
              "beforeDevCommand": "",
              "beforeBuildCommand": "",
              "devUrl": "",
              "frontendDist": ""
            },
            "app": {
              "windows": [
                {
                  "title": "",
                  "width": 1280,
                  "height": 720,
                  "resizable": true,
                  "fullscreen": false
                }
              ],
              "security": {
                "csp": null
              },
              "withGlobalTauri": false
            },
            "bundle": {
              "active": true,
              "targets": "all",
              "identifier": "",
              "icon": []
            }
          }
          EOF

          # Generate Cargo.toml
          cat > src-tauri/Cargo.toml << 'EOF'
          [package]
          name = ""
          version = ""
          description = ""
          authors = ["you"]
          license = ""
          repository = ""
          edition = "2021"

          [build-dependencies]
          tauri-build = { version = "2.0", features = [] }

          [dependencies]
          tauri = { version = "2.0", features = ["shell-open"] }
          serde = { version = "1.0", features = ["derive"] }
          serde_json = "1.0"

          [features]
          default = ["custom-protocol"]
          custom-protocol = ["tauri/custom-protocol"]
          EOF

          # Generate main.rs
          cat > src-tauri/src/main.rs << 'EOF'
          // Prevents additional console window on Windows in release, DO NOT REMOVE!!
          #![cfg_attr(not(debug_assertions), windows_subsystem = "windows")]

          fn main() {
              tauri_build::build()
          }
          EOF

          # Generate build.rs
          cat > src-tauri/build.rs << 'EOF'
          fn main() {
              tauri_build::build()
          }
          EOF

          # Generate update script as CommonJS
          cat > update-config.cjs << 'EOF'
          const fs = require("fs");
          const appName = process.env.APP_NAME;
          const appUrl = process.env.APP_URL;
          const version = process.env.VERSION;
          const safeName = appName.toLowerCase().replace(/\s/g, "-");
          const identifier = `com.${safeName}.app`;

          // Update tauri.conf.json
          const tauriConf = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8"));
          tauriConf.productName = appName;
          tauriConf.version = version;
          tauriConf.identifier = identifier;
          tauriConf.build.devUrl = appUrl;
          tauriConf.app.windows[0].title = appName;
          tauriConf.bundle.identifier = identifier;
          fs.writeFileSync("src-tauri/tauri.conf.json", JSON.stringify(tauriConf, null, 2));

          // Update Cargo.toml
          let cargoToml = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
          cargoToml = cargoToml.replace('name = ""', `name = "${safeName}"`);
          cargoToml = cargoToml.replace('version = ""', `version = "${version}"`);
          cargoToml = cargoToml.replace('description = ""', `description = "${appName} Desktop App"`);
          fs.writeFileSync("src-tauri/Cargo.toml", cargoToml);
          EOF

          # Run update script
          node update-config.cjs

      - name: Upload Tauri config artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-config
          path: src-tauri/

  build-desktop:
    needs: create-tauri-project
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-20.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Tauri config
        uses: actions/download-artifact@v4
        with:
          name: tauri-config
          path: src-tauri/

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-20.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0"

      - name: Build Tauri app
        run: cargo tauri build
        working-directory: ./

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-app-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/

  build-android:
    needs: create-tauri-project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Tauri config
        uses: actions/download-artifact@v4
        with:
          name: tauri-config
          path: src-tauri/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0 ndk;25.2.9519653"

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Install Android targets
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0"

      - name: Initialize Android project
        run: |
          cargo tauri android init
        working-directory: ./
        continue-on-error: true

      - name: Build Android APK
        run: |
          cargo tauri android build --apk
        working-directory: ./

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-app-android
          path: |
            src-tauri/gen/android/app/build/outputs/

  build-ios:
    needs: create-tauri-project
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Tauri config
        uses: actions/download-artifact@v4
        with:
          name: tauri-config
          path: src-tauri/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Install iOS targets
        run: |
          rustup target add aarch64-apple-ios x86_64-apple-ios aarch64-apple-ios-sim

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0"

      - name: Initialize iOS project
        run: |
          cargo tauri ios init
        working-directory: ./
        continue-on-error: true

      - name: Build iOS app
        run: |
          cargo tauri ios build --no-code-sign
        working-directory: ./

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-app-ios
          path: |
            src-tauri/gen/apple/build/
